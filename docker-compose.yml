services:
  api:
    image: python:3.12-slim
    container_name: mtuci-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - PYTHONPATH=/app
      - PYTHONIOENCODING=utf-8
      - LANG=ru_RU.UTF-8
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    env_file:
      - ./backend/.env
    command: sh -c "pip install --no-cache-dir -r requirements.txt && PYTHONPATH=/app alembic -c alembic.ini upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:16
    container_name: mtuci-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gitea:
    image: gitea/gitea:1.22.1
    container_name: mtuci-gitea
    ports:
      - "3000:3000"
    volumes:
      - gitea_data:/data
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mtuci-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3001:3001"
    environment:
      # Прокси Vite → контейнер api (браузер ходит на /api, не на localhost:8000 с хоста)
      - VITE_PROXY_API=http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  gitea_data:

