services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mtuci-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      gitea:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - PYTHONIOENCODING=utf-8
      - LANG=ru_RU.UTF-8
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backups:/backups
    working_dir: /app
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16
    container_name: mtuci-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  gitea:
    image: gitea/gitea:1.22.1
    container_name: mtuci-gitea
    ports:
      - "3000:3000"
    volumes:
      - gitea_data:/data
    env_file:
      - ./backend/.env
    environment:
      # Автоматическая установка Gitea
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=${POSTGRES_DB:-mtuci_app}
      - GITEA__database__USER=${POSTGRES_USER:-mtuci}
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD:-mtuci}
      # Админ пользователь
      - GITEA__admin__DEFAULT_ADMIN_USERNAME=gitea_admin
      - GITEA__admin__DEFAULT_ADMIN_PASSWORD=admin12345
      - GITEA__admin__DEFAULT_ADMIN_EMAIL=admin@gitea.local
      # Сервер настройки
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://localhost:3000/
      - GITEA__server__DISABLE_SSH=true
      # Разрешение webhook для контейнера api
      - GITEA__webhook__ALLOWED_HOST_LIST=api,172.18.0.0/16,*
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mtuci-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      # Прокси Vite → контейнер api (браузер ходит на /api, не на localhost:8000 с хоста)
      - VITE_PROXY_API=http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  gitea_data:

